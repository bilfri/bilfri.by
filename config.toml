# The URL the site will be built for
base_url = "delicate-profiterole-399703.netlify.app"

title = "Bilfri By"
# a description; you can use markdown here if you like
description="En fælles cykeltur for alle der synes at cykelstier giver mere mening end motorveje"
default_language = "en"

highlight_theme = "solarized-light"
generate_feed = true
feed_limit = 20

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Gutenberg
highlight_code = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[extra]
# theme options
profile = "profile.svg" # the name of the profile picture in static/img/
color_themes = ["default", "dark"]
country_flags = true # Display languages as country flags. Defaults to false.

[[extra.socials]]
icon = "globe"
icon_class = "fas"
display = "liquidthink.net"
uri = "liquidthink.net"

[[extra.socials]]
icon = "github"
display = "insipx"
uri = "https://github.com/insipx"

[[extra.socials]]
icon = "twitter"
display = "insipx"
uri = "https://twitter.com/insipx"

[[extra.socials]]
icon = "envelope"
icon_class = "fas"
display = "say hello"
uri = "mailto:github@andrewplaza.dev?subject=hi"

[extra.comments] # Optional
repo = "insipx/Ergo"
theme = "github-light"
label = "comment" # Optional
#issue_number = 1 # Specify either this or term
term = "pathname"

[extra.font_awesome]
kit = "e307e34624"
