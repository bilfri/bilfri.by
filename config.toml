# Base URL of the site, the only required config argument
base_url = "https://bilfri.by"

# Used in RSS by default
title = "Bilfri By"
description = "Fælles cykeltur den sidste fredag i hver måned"
# The default language, used in RSS
default_language = "dk"

# Whether to generate a RSS feed automatically
generate_feed = true
feed_filename = "rss.xml"

# Whether to compile the Sass files found in the `sass` directory
compile_sass = true

# Whether to build a search index out of the pages and section
# content for the `default_language`
build_search_index = false

# A list of glob patterns specifying asset files to ignore when
# processing the content directory.
# Defaults to none, which means all asset files are copied over to the public folder.
# Example:
#     ignored_content = ["*.{graphml,xlsx}", "temp.*"]
ignored_content = []

# Optional translation object. The key if present should be a language code
[translations]

# You can put any kind of data in there and it
# will be accessible in all templates
[extra]

home_subtitle = "Fælles cykeltur den sidste fredag i hver måned"

footer_copyright = ' &#183; <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'

hermit_menu = [
    { link = "/about", name = "Om" },
    { link = "/posts", name = "Opslag" }
]

hermit_social = [
    { name = "facebook", link = "https://www.facebook.com/pg/CriticalMassCPH" },
    { name = "instagram", link = "https://www.instagram.com/bilfri.by/" }
]

[extra.author]
name = "Bilfri By"
email = "author@domain.com"

